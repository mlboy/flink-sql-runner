# 在「创建 Release」时触发，构建后向该 Release 上传 JAR（不在此 workflow 里创建 Release，避免权限问题）
# 使用方式：在 GitHub 仓库 Releases 页 → Create new release → 选择或新建 tag（如 v1.0.0）→ 填写标题/说明 → Publish release → 本 workflow 自动构建并上传 JAR
name: Release JAR

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 读写 Release（获取已有 Release、上传 JAR 资产）所必需
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare JAR for Release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION=${TAG#v}
          cp target/flink-sql-runner-*.jar "flink-sql-runner-${VERSION}.jar"
          echo "JAR_PATH=flink-sql-runner-${VERSION}.jar" >> $GITHUB_ENV

      # 向已存在的 Release 上传 JAR（使用 v1 仅上传资产，不创建 Release）
      - name: Upload JAR to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.JAR_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
